# Déploiement automatique sur GitHub Pages à chaque push sur main.
# Prérequis one-shot (HUMAN_SETUP § A) : Settings → Pages → Source : « GitHub Actions ».
name: Déploiement

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Les tests du moteur de calcul sont une porte de déploiement :
      # un calcul de facture faux ne doit jamais partir en production.
      - name: Tests du moteur de calcul
        run: node tools/test-calc.js

      - name: Injecter l'URL du site et générer le sitemap
        env:
          # La variable de dépôt SITE_URL (Settings → Secrets and variables → Actions → Variables)
          # permet de passer à un domaine personnalisé sans toucher au code.
          SITE_URL_OVERRIDE: ${{ vars.SITE_URL }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_LC="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          export SITE_URL="${SITE_URL_OVERRIDE:-https://${OWNER_LC}.github.io/${REPO_NAME}/}"
          echo "URL de déploiement : $SITE_URL"
          node tools/prepare-deploy.js

      # Prérequis one-shot : Pages activé avec la source « GitHub Actions »
      # (Paramètres → Pages). L'activation par API exige des droits admin
      # que le jeton du workflow n'a pas — c'est un clic humain, une seule fois.
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment

      # Indexation accélérée : notifie IndexNow (Bing, Yandex…) des URLs publiées.
      # Sans compte ni secret — la clé hébergée à la racine du site fait foi.
      # continue-on-error : un caprice d'IndexNow ne doit jamais bloquer un déploiement.
      - name: Ping IndexNow
        continue-on-error: true
        env:
          SITE_URL_OVERRIDE: ${{ vars.SITE_URL }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_LC="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          export SITE_URL="${SITE_URL_OVERRIDE:-https://${OWNER_LC}.github.io/${REPO_NAME}/}"
          node tools/indexnow.js
