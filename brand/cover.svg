<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2b4a"/>
      <stop offset="1" stop-color="#14203a"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- illustration : facture stylisée, à droite, légèrement inclinée -->
  <g transform="translate(1150 36) rotate(-5)">
    <rect x="0" y="0" width="300" height="324" rx="10" fill="#ffffff"/>
    <rect x="28" y="34" width="150" height="16" rx="3" fill="#1c2b4a"/>
    <rect x="28" y="60" width="96" height="9" rx="3" fill="#c9cedd"/>
    <rect x="200" y="30" width="72" height="11" rx="3" fill="#bf3b1f"/>
    <rect x="28" y="120" width="244" height="8" rx="3" fill="#e9e4d6"/>
    <rect x="28" y="146" width="244" height="8" rx="3" fill="#e9e4d6"/>
    <rect x="28" y="172" width="244" height="8" rx="3" fill="#e9e4d6"/>
    <rect x="28" y="198" width="180" height="8" rx="3" fill="#e9e4d6"/>
    <rect x="120" y="250" width="152" height="40" rx="6" fill="#1c2b4a"/>
    <rect x="138" y="265" width="80" height="10" rx="3" fill="#f6f1e6"/>
    <circle cx="250" cy="270" r="6" fill="#bf3b1f"/>
  </g>

  <!-- bloc texte : maintenu dans la moitié haute pour laisser le bas-gauche
       libre (la photo de profil recouvre ce coin sur LinkedIn) -->
  <text x="96" y="104" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#f6f1e6">Facture<tspan fill="#bf3b1f" font-style="italic">Libre</tspan><tspan fill="#bf3b1f">.</tspan></text>
  <text x="100" y="156" font-family="Georgia, serif" font-size="31" fill="#f6f1e6">La facture conforme des micro-entrepreneurs.</text>
  <text x="100" y="192" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#cdd3e4">Gratuit &#183; sans inscription &#183; vos donn&#233;es restent dans votre navigateur</text>

  <!-- pastille URL -->
  <rect x="100" y="216" width="424" height="40" rx="20" fill="none" stroke="#f6f1e6" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="123" cy="236" r="5" fill="#bf3b1f"/>
  <text x="139" y="243" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#f6f1e6">gwada9714.github.io/facture-libre</text>
</svg>
